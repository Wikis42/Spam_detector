services:
  postgres:
    image: postgres:16-alpine
    container_name: spam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spam_pass}
      POSTGRES_DB: ${POSTGRES_DB:-spam_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spam_user} -d ${POSTGRES_DB:-spam_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: spam_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-spam_user}:${POSTGRES_PASSWORD:-spam_pass}@postgres:5432/${POSTGRES_DB:-spam_db}
      HF_MODEL: ${HF_MODEL:-RUSpam/spamNS_v1}
      MAX_TEXT_LENGTH: ${MAX_TEXT_LENGTH:-500}
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/app/hf_cache

volumes:
  postgres_data:
  hf_cache:
